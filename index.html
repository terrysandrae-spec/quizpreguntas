<!DOCTYPE html>
<html lang="es">
<head>
<meta property="og:title" content="🎯 Test de Diagnóstico: ¿Estás listo para las preguntas del jurado?" />
<meta property="og:description" content="Toma este test gratuito de menos de 3 minutos y descubre cómo vas." />
<meta property="og:image" content="https://testpreguntas.sustentacionexitosa.com/portada.png" />

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Interactivo - Eureka Tesis con Sandra</title>
    
    <!-- Tailwind CSS CDN para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDNs para la lógica de la aplicación -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel CDN para compilar JSX en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Estilos de Animación CSS -->
    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideInFromBottom { from { transform: translateY(2rem); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideInFromRight { from { transform: translateX(2rem); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .animate-in { animation-duration: 600ms; animation-fill-mode: both; animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in { animation-name: fadeIn; }
        .slide-in-from-bottom-8 { animation-name: slideInFromBottom; }
        .zoom-in-95 { animation-name: zoomIn; }
        .slide-in-from-right-8 { animation-name: slideInFromRight; }
    </style>
</head>
<body class="bg-slate-50 font-sans selection:bg-teal-200">
    
    <!-- Contenedor principal donde React inyectará la aplicación -->
    <div id="root"></div>

    <!-- Script de la aplicación React -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONOS NATIVOS SVG ---
        const BookOpen = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const ArrowRight = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const ChevronLeft = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
        const RefreshCw = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const MessageCircle = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>;
        const TrendingUp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const TrendingDown = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>;

        // --- DATOS DEL QUIZ ---
        const QUESTIONS_DATA = [
          {
            id: 1, area: 'Tema y problema',
            text: '¿Qué tan bien puedes explicar cuál es tu tema y por qué lo elegiste?',
            options: [
              { label: 'A', score: 10, text: 'Lo explico con seguridad y conecto su relevancia social y académica' },
              { label: 'B', score: 7, text: 'Lo explico, pero me cuesta justificar bien su importancia' },
              { label: 'C', score: 4, text: 'Sé el tema, pero me trabo al explicar el "por qué"' },
              { label: 'D', score: 0, text: 'Aún no lo tengo claro' }
            ]
          },
          {
            id: 2, area: 'Tema y problema',
            text: '¿Podrías explicar qué problema específico aborda tu investigación y por qué es relevante?',
            options: [
              { label: 'A', score: 10, text: 'Sí, lo tengo claro y sé justificar su relevancia' },
              { label: 'B', score: 7, text: 'Lo conozco, pero me costaría defender su importancia' },
              { label: 'C', score: 4, text: 'Sé cuál es, pero no por qué importa tanto' },
              { label: 'D', score: 0, text: 'No lo tengo bien definido' }
            ]
          },
          {
            id: 3, area: 'Marco teórico',
            text: 'Si el jurado te pregunta por las teorías y autores que sustentan tu tesis, ¿cómo te sientes?',
            options: [
              { label: 'A', score: 10, text: 'Domino mis teorías y sé por qué las elegí' },
              { label: 'B', score: 7, text: 'Las conozco, pero no del todo cómo defenderlas' },
              { label: 'C', score: 4, text: 'Las mencioné en mi tesis, pero no las tengo frescas' },
              { label: 'D', score: 0, text: 'Me da pánico esa parte' }
            ]
          },
          {
            id: 4, area: 'Metodología',
            text: '¿Podrías justificar tu enfoque metodológico (cuantitativo, cualitativo o mixto) si te lo cuestionan?',
            options: [
              { label: 'A', score: 10, text: 'Sí, sé defender por qué elegí mi enfoque' },
              { label: 'B', score: 7, text: 'Más o menos, en algunas partes dudaría' },
              { label: 'C', score: 4, text: 'Sé qué hice, pero no por qué lo hice así' },
              { label: 'D', score: 0, text: 'Es mi mayor punto débil' }
            ]
          },
          {
            id: 5, area: 'Metodología',
            text: '¿Qué tan preparado estás para explicar cómo seleccionaste tu muestra y tus técnicas de recolección de datos?',
            options: [
              { label: 'A', score: 10, text: 'Lo tengo claro y sé justificar cada decisión' },
              { label: 'B', score: 7, text: 'Lo conozco, pero dudaría en algunos detalles' },
              { label: 'C', score: 4, text: 'Sé qué hice, pero no cómo defenderlo' },
              { label: 'D', score: 0, text: 'No sabría explicarlo con seguridad' }
            ]
          },
          {
            id: 6, area: 'Resultados',
            text: 'Cuando piensas en explicar tus principales hallazgos ante el jurado...',
            options: [
              { label: 'A', score: 10, text: 'Los tengo claros y sé qué significan' },
              { label: 'B', score: 7, text: 'Los conozco, pero me cuesta interpretarlos en voz alta' },
              { label: 'C', score: 4, text: 'Sé los datos, pero no qué responder si me los cuestionan' },
              { label: 'D', score: 0, text: 'No sabría presentarlos con seguridad' }
            ]
          },
          {
            id: 7, area: 'Resultados',
            text: '¿Sabrías explicar qué relación tienen tus resultados con tus objetivos o hipótesis?',
            options: [
              { label: 'A', score: 10, text: 'Sí, conecto claramente resultados con objetivos' },
              { label: 'B', score: 7, text: 'Más o menos, me costaría hacerlo con fluidez' },
              { label: 'C', score: 4, text: 'Lo escribí, pero no lo he repasado para defenderlo' },
              { label: 'D', score: 0, text: 'No tengo clara esa conexión' }
            ]
          },
          {
            id: 8, area: 'Conclusiones y limitaciones',
            text: 'Si el jurado te pide explicar tus conclusiones y reconocer las limitaciones de tu estudio, ¿cómo te sientes?',
            options: [
              { label: 'A', score: 10, text: 'Expongo mis conclusiones con seguridad y asumo mis limitaciones con honestidad' },
              { label: 'B', score: 7, text: 'Explico bien mis conclusiones, pero me incomoda hablar de las limitaciones' },
              { label: 'C', score: 4, text: 'Las escribí, pero no las he repasado para defenderlas' },
              { label: 'D', score: 0, text: 'Casi no he pensado en cómo defender esa parte' }
            ]
          },
          {
            id: 9, area: 'Recomendaciones y aporte',
            text: '¿Podrías explicar qué recomendaciones o aplicaciones prácticas se derivan de tu investigación?',
            options: [
              { label: 'A', score: 10, text: 'Sí, tengo claras mis recomendaciones y su utilidad' },
              { label: 'B', score: 7, text: 'Las tengo, pero me costaría desarrollarlas' },
              { label: 'C', score: 4, text: 'Las mencioné, pero no las tengo frescas' },
              { label: 'D', score: 0, text: 'No las tengo bien definidas' }
            ]
          },
          {
            id: 10, area: 'Recomendaciones y aporte',
            text: '¿Sabrías explicar cuál es la principal contribución de tu estudio al conocimiento o a la sociedad?',
            options: [
              { label: 'A', score: 10, text: 'Sí, tengo muy clara mi contribución' },
              { label: 'B', score: 7, text: 'La intuyo, pero me costaría expresarla con claridad' },
              { label: 'C', score: 4, text: 'Sé que aporta algo, pero no sabría defenderlo' },
              { label: 'D', score: 0, text: 'No lo tengo claro' }
            ]
          }
        ];

        const AREAS_MAPPING = [
          { name: 'Tema y problema', indices: [0, 1] },
          { name: 'Marco teórico', indices: [2] },
          { name: 'Metodología', indices: [3, 4] },
          { name: 'Resultados', indices: [5, 6] },
          { name: 'Conclusiones y limitaciones', indices: [7] },
          { name: 'Recomendaciones y aporte', indices: [8, 9] }
        ];

        // --- COMPONENTES UI REUTILIZABLES ---
        const Button = ({ className, variant = "default", size = "default", children, disabled, asChild, ...props }) => {
          const baseStyle = "inline-flex items-center justify-center rounded-xl font-semibold transition-all duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring disabled:pointer-events-none disabled:opacity-50 active:scale-[0.98]";
          const variants = {
            default: "bg-teal-600 text-white hover:bg-teal-700 shadow-md",
            secondary: "bg-slate-100 text-slate-900 hover:bg-slate-200",
            outline: "border-2 border-slate-200 bg-transparent hover:bg-slate-50 text-slate-900",
            ghost: "hover:bg-slate-100 text-slate-700 hover:text-slate-900",
            mustard: "bg-amber-500 text-slate-900 hover:bg-amber-600 shadow-md",
            dark: "bg-slate-900 text-white hover:bg-slate-800 shadow-md",
            whatsapp: "bg-[#25D366] text-white hover:bg-[#20bd5a] shadow-md"
          };
          const sizes = {
            default: "h-12 px-6 py-3 text-base",
            sm: "h-9 px-4 text-sm",
            lg: "h-14 px-8 text-lg",
            icon: "h-10 w-10"
          };
          
          if (asChild) {
            return React.cloneElement(children, {
              className: `${baseStyle} ${variants[variant]} ${sizes[size]} ${className || ''} ${children.props.className || ''}`,
              ...props
            });
          }

          return (
            <button disabled={disabled} className={`${baseStyle} ${variants[variant]} ${sizes[size]} ${className || ''}`} {...props}>
              {children}
            </button>
          );
        };

        const Card = ({ className, children }) => <div className={`rounded-2xl border bg-white shadow-sm overflow-hidden ${className || ''}`}>{children}</div>;
        const CardHeader = ({ className, children }) => <div className={`flex flex-col space-y-1.5 p-6 md:p-8 pb-4 ${className || ''}`}>{children}</div>;
        const CardTitle = ({ className, children }) => <h3 className={`text-2xl font-bold leading-tight text-slate-900 ${className || ''}`}>{children}</h3>;
        const CardDescription = ({ className, children }) => <p className={`text-slate-500 mt-2 leading-relaxed ${className || ''}`}>{children}</p>;
        const CardContent = ({ className, children }) => <div className={`p-6 md:p-8 pt-0 ${className || ''}`}>{children}</div>;

        const Badge = ({ className, variant = "default", children, style }) => {
          const variants = {
            default: "bg-teal-100 text-teal-800 border-teal-200",
            secondary: "bg-slate-100 text-slate-800 border-slate-200",
            outline: "border-2 border-slate-200 text-slate-600",
            primary: "bg-teal-600 text-white border-teal-600",
            warning: "bg-amber-100 text-amber-800 border-amber-200",
            danger: "bg-rose-100 text-rose-800 border-rose-200"
          };
          return (
            <div style={style} className={`inline-flex items-center rounded-full border px-3 py-1 text-xs font-bold uppercase tracking-wider ${variants[variant] || ''} ${className || ''}`}>
              {children}
            </div>
          );
        };

        // --- PANTALLAS ---
        const StartScreen = ({ onStart }) => (
          <div className="w-full max-w-4xl mx-auto animate-in fade-in zoom-in-95 duration-500">
            <Card className="border-0 shadow-xl bg-white/90 backdrop-blur-sm">
              <CardContent className="p-8 md:p-12 text-center space-y-8 mt-6">
                <div className="inline-flex items-center gap-2 px-4 py-2 bg-teal-50 text-teal-700 rounded-full text-sm font-bold tracking-wide uppercase shadow-sm mx-auto">
                  <BookOpen className="w-4 h-4" />
                  Eureka - Tesis con Sandra
                </div>

                <h1 className="text-4xl md:text-5xl lg:text-6xl font-extrabold text-slate-900 leading-tight">
                  ¿Estás listo para las preguntas del jurado?
                </h1>

                <p className="text-lg md:text-xl text-slate-600 max-w-2xl mx-auto leading-relaxed">
                  Este test evalúa tu preparación para la sustentación de tesis. Responde 10 preguntas sobre tu investigación y descubre en qué áreas necesitas reforzar antes del gran día.
                </p>

                <div className="relative w-full h-64 md:h-80 rounded-3xl overflow-hidden shadow-inner bg-slate-100">
                  <img
                    src="https://horizons-cdn.hostinger.com/32f97c10-1527-4730-8807-57a35278f89f/33a747a97b85a9e6d27ff413b1603868.png"
                    alt="Preparación para sustentación"
                    className="w-full h-full object-cover"
                    onError={(e) => { e.target.src = "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?auto=format&fit=crop&q=80&w=1200" }}
                  />
                  <div className="absolute inset-0 bg-gradient-to-t from-slate-900/60 via-slate-900/10 to-transparent" />
                </div>

                <div className="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-8 font-medium text-slate-600">
                  <span className="flex items-center gap-2">⏱️ Tiempo estimado: 3-5 minutos</span>
                  <span className="flex items-center gap-2">📊 Diagnóstico personalizado al finalizar</span>
                </div>

                <div className="pt-4 flex justify-center">
                  <Button onClick={onStart} size="lg" className="w-full sm:w-auto px-12 py-6 text-lg">
                    Empezar el test
                    <ArrowRight className="ml-2 w-5 h-5" />
                  </Button>
                </div>
              </CardContent>
            </Card>
          </div>
        );

        const QuestionScreen = ({ question, currentQuestion, totalQuestions, selectedAnswer, onAnswer, onNext, onPrevious, canGoPrevious }) => {
          const progress = (currentQuestion / totalQuestions) * 100;
          const isLastQuestion = currentQuestion === totalQuestions;
          const hasAnswered = selectedAnswer !== null && selectedAnswer !== undefined;

          return (
            <Card className="w-full max-w-3xl mx-auto border-0 shadow-xl animate-in slide-in-from-right-8 fade-in duration-500">
              <CardContent className="p-6 md:p-10 mt-6">
                
                {/* Barra de Progreso */}
                <div className="space-y-3 mb-8">
                  <div className="flex items-center justify-between text-sm font-medium text-slate-500">
                    <span>Pregunta {currentQuestion} de {totalQuestions}</span>
                    <span>{Math.round(progress)}%</span>
                  </div>
                  <div className="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
                    <div 
                      className="h-full bg-teal-500 transition-all duration-500 ease-out rounded-full" 
                      style={{ width: `${progress}%` }} 
                    />
                  </div>
                </div>

                {/* Badge Area y Pregunta (CONFIGURACIÓN APLICADA #fcae00) */}
                <div className="mb-10 text-center">
                  <Badge 
                    className="mb-4 text-sm px-4 py-1.5 border-0 shadow-sm" 
                    style={{ backgroundColor: '#fcae00', color: '#0f172a' }}
                  >
                    {question.area}
                  </Badge>
                  <h2 className="text-2xl md:text-3xl font-bold text-slate-900 leading-snug">
                    {question.text}
                  </h2>
                </div>

                {/* Opciones */}
                <div className="space-y-4 mb-10">
                  {question.options.map((option, index) => {
                    const isSelected = selectedAnswer === option.score;
                    return (
                      <button
                        key={index}
                        onClick={() => onAnswer(option.score)}
                        className={`w-full text-left p-4 md:p-5 rounded-xl border-2 transition-all duration-200 group flex items-start gap-4 cursor-pointer ${
                          isSelected 
                            ? 'border-teal-500 bg-teal-50 ring-4 ring-teal-500/10 scale-[1.01]' 
                            : 'border-slate-200 bg-white hover:border-teal-300 hover:bg-slate-50'
                        }`}
                      >
                        <div className={`flex-shrink-0 w-10 h-10 md:w-12 md:h-12 rounded-lg flex items-center justify-center font-bold text-lg transition-colors ${
                          isSelected ? 'bg-teal-500 text-white' : 'bg-slate-100 text-slate-600 group-hover:bg-teal-100 group-hover:text-teal-700'
                        }`}>
                          {option.label}
                        </div>
                        <div className="flex-1 pt-1 md:pt-2">
                          <p className={`text-base md:text-lg font-medium leading-relaxed ${isSelected ? 'text-teal-900' : 'text-slate-700'}`}>
                            {option.text}
                          </p>
                        </div>
                      </button>
                    );
                  })}
                </div>

                {/* Controles */}
                <div className="flex items-center justify-between pt-6 border-t border-slate-100">
                  <Button onClick={onPrevious} disabled={!canGoPrevious} variant="ghost" className="px-4">
                    <ChevronLeft className="w-5 h-5 mr-1" /> Anterior
                  </Button>
                  <Button 
                    onClick={onNext} 
                    disabled={!hasAnswered} 
                    variant={isLastQuestion ? "mustard" : "default"}
                    className={isLastQuestion ? "px-8" : "px-8"}
                  >
                    {isLastQuestion ? 'Ver resultados' : 'Siguiente'}
                    <ArrowRight className="ml-2 w-5 h-5" />
                  </Button>
                </div>
              </CardContent>
            </Card>
          );
        };

        const ResultsScreen = ({ score, totalQuestions, answers, onRestart }) => {
          const displayScore = score;
          let level = ''; let diagnostic = ''; let suggestion = ''; let ctaTitle = ''; 
          let icon = ''; let colorClass = ''; let bgClass = ''; let badgeVariant = '';

          if (displayScore >= 70) {
            level = 'Casi listo'; icon = '💪'; colorClass = 'text-teal-700'; bgClass = 'bg-teal-50/50'; badgeVariant = 'default';
            diagnostic = '¡Vas muy bien! Tienes una comprensión sólida de tu investigación y estás preparado para la mayoría de las preguntas del jurado. Con un poco más de práctica en las áreas específicas que identificamos, estarás completamente listo para brillar en tu sustentación.';
            suggestion = 'Enfócate en pulir tus respuestas y practicar la presentación oral. Revisa las áreas más débiles y prepara ejemplos concretos.';
            ctaTitle = 'Asegura tu defensa con estos recursos';
          } else if (displayScore >= 40) {
            level = 'En preparación'; icon = '📚'; colorClass = 'text-amber-700'; bgClass = 'bg-amber-50/50'; badgeVariant = 'warning';
            diagnostic = 'Conoces tu investigación, pero hay aspectos importantes que necesitas reforzar antes de la sustentación. No te preocupes, identificar estas áreas es el primer paso para mejorar. Con dedicación y los recursos adecuados, puedes alcanzar el nivel que necesitas.';
            suggestion = 'Dedica tiempo a estudiar las áreas débiles. Practica explicar tu metodología y resultados en voz alta. Busca retroalimentación de tu asesor.';
            ctaTitle = 'Esto es justo lo que necesitas para mejorar';
          } else {
            level = 'Necesitas reforzar'; icon = '🌱'; colorClass = 'text-rose-700'; bgClass = 'bg-rose-50/50'; badgeVariant = 'danger';
            diagnostic = 'Respira: sentir que aún no estás listo es completamente normal y, de hecho, es una señal de que eres consciente de lo que necesitas trabajar. Este test te muestra exactamente dónde enfocar tus esfuerzos. Con la guía correcta y dedicación, puedes transformar esta preparación en una defensa exitosa.';
            suggestion = 'Comienza por lo básico: asegúrate de poder explicar tu problema de investigación y metodología con claridad. Trabaja con tu asesor y considera apoyo adicional.';
            ctaTitle = 'Da el siguiente paso hacia tu éxito';
          }

          // Desglose de Áreas
          const areaResults = AREAS_MAPPING.map(area => {
            const maxScore = area.indices.length * 10;
            const earned = area.indices.reduce((acc, idx) => acc + (answers[idx] || 0), 0);
            return { name: area.name, percentage: Math.round((earned / maxScore) * 100) };
          });
          
          const sortedAreas = [...areaResults].sort((a, b) => b.percentage - a.percentage);
          const strongestArea = sortedAreas[0];
          const weakestArea = sortedAreas[sortedAreas.length - 1];

          return (
            <div className="w-full max-w-4xl mx-auto space-y-8 animate-in fade-in slide-in-from-bottom-8 duration-700 py-8">
              
              {/* Puntuación Principal */}
              <Card className="border-2 text-center overflow-hidden">
                <div className={`p-8 md:p-12 ${bgClass}`}>
                  <Badge variant={badgeVariant} className="mb-6 px-4 py-1.5 text-sm shadow-sm border-0 mx-auto">
                    Tu puntaje final
                  </Badge>
                  
                  <div className="text-7xl md:text-8xl font-black text-slate-900 mb-6 tracking-tight flex justify-center items-baseline">
                    {displayScore}<span className="text-4xl md:text-5xl text-slate-400 font-bold">/100</span>
                  </div>
                  
                  <div className="inline-flex items-center justify-center gap-3 px-6 py-3 bg-white rounded-full shadow-sm mb-8 border border-slate-100 mx-auto">
                    <span className="text-3xl">{icon}</span>
                    <span className={`text-2xl font-bold ${colorClass}`}>{level}</span>
                  </div>

                  <div className="max-w-3xl mx-auto space-y-6 text-left bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100">
                    <p className="text-lg text-slate-700 leading-relaxed text-center font-medium">
                      {diagnostic}
                    </p>
                    <div className={`p-4 rounded-xl border-l-4 ${badgeVariant === 'default' ? 'bg-teal-50 border-teal-500' : badgeVariant === 'warning' ? 'bg-amber-50 border-amber-500' : 'bg-rose-50 border-rose-500'}`}>
                      <p className="font-semibold text-slate-800">
                        <span className="mr-2">💡</span> Sugerencia: {suggestion}
                      </p>
                    </div>
                  </div>
                </div>
              </Card>

              {/* Desglose por áreas */}
              <Card className="border-2">
                <CardHeader className="border-b border-slate-100 bg-slate-50/50">
                  <CardTitle>Desglose por áreas</CardTitle>
                  <CardDescription>Tu desempeño en cada componente clave de la investigación</CardDescription>
                </CardHeader>
                <CardContent className="pt-8 space-y-8">
                  {areaResults.map((area, idx) => (
                    <div key={idx} className="space-y-3">
                      <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                        <div className="flex items-center gap-3">
                          <span className="font-bold text-slate-800">{area.name}</span>
                          {area.name === strongestArea.name && (
                            <Badge variant="primary" className="text-[10px] py-0.5"><TrendingUp className="w-3 h-3 mr-1" /> Fuerte</Badge>
                          )}
                          {area.name === weakestArea.name && (
                            <Badge variant="danger" className="text-[10px] py-0.5"><TrendingDown className="w-3 h-3 mr-1" /> Reforzar</Badge>
                          )}
                        </div>
                        <span className="font-black text-lg text-slate-600">{area.percentage}%</span>
                      </div>
                      <div className="w-full h-3 bg-slate-100 rounded-full overflow-hidden">
                        <div 
                          className={`h-full rounded-full transition-all duration-1000 ease-out ${area.percentage < 50 ? 'bg-amber-400' : 'bg-teal-500'}`} 
                          style={{ width: `${area.percentage}%` }} 
                        />
                      </div>
                    </div>
                  ))}
                </CardContent>
              </Card>

              {/* Llamados a la acción */}
              <div className="space-y-8 pt-8">
                <h3 className="text-2xl md:text-3xl font-extrabold text-center text-slate-900">
                  {ctaTitle}
                </h3>
                
                <div className="grid md:grid-cols-2 gap-6">
                  <Card className="border-2 border-amber-400 bg-amber-50/30 flex flex-col relative overflow-visible">
                    <span className="absolute -top-3.5 left-6 bg-amber-400 text-slate-900 text-xs font-bold uppercase tracking-wider py-1.5 px-4 rounded-full shadow-sm">
                      RECURSO RECOMENDADO
                    </span>
                    <CardHeader className="mt-4">
                      <CardTitle className="text-xl">Guía: 100 preguntas populares en la sustentación y cómo responderlas</CardTitle>
                      <CardDescription className="text-slate-700 mt-3 text-base">Prepárate con las preguntas más frecuentes del jurado y su estructura de respuesta.</CardDescription>
                    </CardHeader>
                    <CardContent className="mt-auto pt-4 flex justify-center">
                      <Button asChild variant="mustard" className="w-full cursor-pointer">
                        <a href="https://wa.link/z5j2zs" target="_blank" rel="noopener noreferrer">
                          QUIERO LA GUÍA DE 100 PREGUNTAS <ArrowRight className="ml-2 w-5 h-5" />
                        </a>
                      </Button>
                    </CardContent>
                  </Card>

                  <Card className="border-2 border-slate-200 flex flex-col">
                    <CardHeader>
                      <CardTitle className="text-xl">Balotario de preguntas y respuestas personalizadas</CardTitle>
                      <CardDescription className="text-slate-600 mt-3 text-base">Consulta cómo obtener tu balotario adaptado específicamente a tu investigación.</CardDescription>
                    </CardHeader>
                    <CardContent className="mt-auto pt-4 flex justify-center">
                      <Button asChild variant="dark" className="w-full cursor-pointer">
                        <a href="https://wa.link/hl8wrx" target="_blank" rel="noopener noreferrer">
                          QUIERO MI BALOTARIO <ArrowRight className="ml-2 w-5 h-5" />
                        </a>
                      </Button>
                    </CardContent>
                  </Card>
                </div>
              </div>

              {/* Contacto Directo */}
              <Card className="bg-[#25D366]/10 border-2 border-[#25D366] overflow-hidden mt-10">
                <CardContent className="p-8 sm:p-12 text-center flex flex-col items-center">
                  <h4 className="text-2xl font-bold text-slate-900 mb-6">¿Tienes dudas o necesitas ayuda personalizada?</h4>
                  <Button asChild size="lg" variant="whatsapp" className="px-10 py-7 text-lg rounded-2xl cursor-pointer">
                    <a href="https://wa.link/j3pcb0" target="_blank" rel="noopener noreferrer">
                      <MessageCircle className="mr-3 w-6 h-6 fill-current" /> Escríbeme por WhatsApp
                    </a>
                  </Button>
                </CardContent>
              </Card>

              {/* Volver a empezar */}
              <div className="text-center pt-8 pb-12 flex justify-center">
                <Button onClick={onRestart} variant="ghost" className="text-slate-500 hover:text-slate-900 cursor-pointer">
                  <RefreshCw className="mr-2 w-5 h-5" /> Volver a empezar el test
                </Button>
              </div>
            </div>
          );
        };

        // --- APLICACIÓN PRINCIPAL (Layout y Estado) ---
        function App() {
          const [screen, setScreen] = useState('START'); // 'START' | 'QUESTION' | 'RESULTS'
          const [currentQIndex, setCurrentQIndex] = useState(0);
          const [answers, setAnswers] = useState(Array(10).fill(null));

          // Desplaza la vista hacia arriba al cambiar de pantalla
          useEffect(() => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }, [screen, currentQIndex]);

          const handleStart = () => {
            setAnswers(Array(10).fill(null));
            setCurrentQIndex(0);
            setScreen('QUESTION');
          };

          const handleAnswer = (score) => {
            const newAnswers = [...answers];
            newAnswers[currentQIndex] = score;
            setAnswers(newAnswers);
          };

          const handleNext = () => {
            if (currentQIndex < QUESTIONS_DATA.length - 1) {
              setCurrentQIndex(prev => prev + 1);
            } else {
              setScreen('RESULTS');
            }
          };

          const handlePrev = () => {
            if (currentQIndex > 0) {
              setCurrentQIndex(prev => prev - 1);
            }
          };

          return (
            <div className="min-h-screen flex flex-col bg-slate-50 font-sans selection:bg-teal-200">
              {/* Header Fijo */}
              <header className="sticky top-0 z-50 w-full bg-white/80 backdrop-blur-md border-b border-slate-200 shadow-sm py-4 px-6 flex justify-center items-center">
                <div className="flex items-center gap-2 text-teal-600">
                  <BookOpen className="w-5 h-5" />
                  <span className="font-bold text-sm tracking-widest uppercase">Eureka - Tesis con Sandra</span>
                </div>
              </header>

              {/* Contenedor de Pantallas */}
              <main className="flex-grow flex flex-col items-center justify-center p-4 sm:p-6 lg:p-8 w-full">
                {screen === 'START' && (
                  <StartScreen onStart={handleStart} />
                )}
                
                {screen === 'QUESTION' && (
                  <QuestionScreen 
                    question={QUESTIONS_DATA[currentQIndex]}
                    currentQuestion={currentQIndex + 1}
                    totalQuestions={QUESTIONS_DATA.length}
                    selectedAnswer={answers[currentQIndex]}
                    onAnswer={handleAnswer}
                    onNext={handleNext}
                    onPrevious={handlePrev}
                    canGoPrevious={currentQIndex > 0}
                  />
                )}

                {screen === 'RESULTS' && (
                  <ResultsScreen 
                    score={answers.reduce((sum, score) => sum + (score || 0), 0)}
                    totalQuestions={QUESTIONS_DATA.length}
                    answers={answers}
                    onRestart={() => setScreen('START')}
                  />
                )}
              </main>
            </div>
          );
        }

        // Renderizado inicial de React
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
